<!DOCTYPE html>
<html>
<head>
    <title>Login - Sheet Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef4ff 0%, #f6fbf7 100%);
            margin: 0;
            padding: 0;
        }

        .login-container {
            width: 380px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.10);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #14478f;
        }

        p {
            color: #64748b;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
        }

        .erro {
            color: #dc2626;
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Sheet Control</h1>
        <p>Acesso ao sistema</p>

        {% if erro %}
            <div class="erro">{{ erro }}</div>
        {% endif %}

        <form method="post">
            <input type="text" name="usuario" placeholder="Usuário" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
